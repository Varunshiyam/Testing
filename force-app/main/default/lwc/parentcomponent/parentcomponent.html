<template>
    <lightning-card title="Parent Component">
        <div class="slds-p-around_medium">

            <lightning-input
                label="Enter Your Name"
                onchange={handleChange}>
            </lightning-input>

            <lightning-button
                label="Show Message"
                variant="brand"
                class="slds-m-top_small"
                onclick={handleClick}>
            </lightning-button>

            <!-- Child component renders ONLY after button click -->
            <template if:true={showChild}>
                <c-childcomponent name={passvalue}></c-childcomponent>
            </template>

        </div>
    </lightning-card>
</template>
