<template>
    <lightning-card title="Create a Book">

        <div class="slds-p-around_medium">

            <lightning-input label="Book Name" onchange={handleName}></lightning-input>

            <lightning-input label="Author" onchange={handleAuthor}></lightning-input>

            <lightning-input label="ISBN" onchange={handleIsbn}></lightning-input>

            <lightning-input type="number" label="Price" onchange={handlePrice}></lightning-input>

            <lightning-input type="number" label="Available Copies" onchange={handleCopies}></lightning-input>

            <lightning-input type="date" label="Purchased Date" onchange={handleDate}></lightning-input>

            <br/>

            <lightning-button label="Save Book"
                              variant="brand"
                              onclick={saveBook}>
            </lightning-button>

        </div>

    </lightning-card>
</template>
