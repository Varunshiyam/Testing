<template>
    <div class="guide-container">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
        </template>

        <template if:false={isLoading}>
            <!-- Progress Indicator -->
            <div class="progress-section">
                <div class="custom-progress-path">
                    <template for:each={stepsWithStatus} for:item="step">
                        <button type="button" key={step.value} class={step.className} data-index={step.index}
                            onclick={handleStepClick} aria-label={step.label}>
                            <span class="step-marker">{step.number}</span>
                            <span class="step-label">{step.label}</span>
                        </button>
                    </template>
                </div>
            </div>

            <!-- Step Content -->
            <div class="content-section">
                <!-- Welcome -->
                <template if:true={isWelcome}>
                    <div class="step-content welcome-step">
                        <div class="hero-section">
                            <img src={agentforceBanner} alt="Agentforce 36O Platform" class="hero-banner" />
                            <br/>
                            <p class="hero-tagline">Innovate fast, deploy securely, and protect your data.</p>
                        </div>
                        <div class="platform-intro">
                            <p>Welcome to your free trial! The Agentforce 36O Platform is your unified platform to
                                build, customize, and deploy powerful agents and applications on Salesforce.</p>
                            <p>Salesforce's built-in agent and application lifecycle management and governance tools
                                help you build with confidence. Leverage the full power of Salesforce data and metadata;
                                automate intelligent workflows; generate UI experiences with Agentforce Vibes; manage
                                deployments securely; and keep your org, data, and agents secure with enterprise-grade
                                visibility.</p>
                            <p class="trial-highlight">With this free trial, you get hands-on access to &nbsp;
                                <strong>Agentforce Builder</strong>, <strong>Agentforce Vibes</strong>, <strong>Agentforce Testing Center</strong>, <strong>Metadata Deployment</strong>, <strong>Event
                                    Monitoring</strong>, and a fully functional custom AI application – giving you everything you need to innovate fast, deploy securely, and protect your data on Salesforce. 

                            </p>
                            <p class="trial-highlight">You will complete these workshop steps in one of the two orgs you received—you get two separate password reset emails. Use one org as your main org (where you do the steps) and the other as your target org when you deploy in the Deploy Securely section.</p>
                            <div class="react-setup-notice">
                                <p class="react-setup-notice-title">⚙️ Want to explore React apps in this org? Enable the following settings first:</p>
                                <ol class="react-setup-steps">
                                    <li>
                                        <strong>Enable Salesforce Multi-Framework</strong><br/>
                                        Go to: <em>Setup → React Development with Salesforce Multi-Framework (Beta)</em><br/>
                                        Turn on: <strong>Salesforce Multi-Framework → Enable Beta</strong>
                                    </li>
                                    <li>
                                        <strong>Enable Digital Experiences</strong><br/>
                                        Go to: <em>Setup → Digital Experiences → Settings</em><br/>
                                        Turn on: <strong>Enable Digital Experiences</strong>
                                    </li>
                                    <li>
                                        <strong>Enable Salesforce CMS MCP access</strong><br/>
                                        Go to: <em>Setup → Digital Experiences → Salesforce CMS</em><br/>
                                        Turn on: <strong>Access the Content Read-Only MCP Server and Tools (Beta)</strong>
                                    </li>
                                    <li>
                                        <strong>Preview your React app in real-time</strong><br/>
                                        Download the <a href="https://marketplace.visualstudio.com/items?itemName=salesforce.salesforcedx-vscode-ui-preview" target="_blank" rel="noopener noreferrer">Salesforce UI Preview VS Code extension</a> to preview your React app directly in VS Code.
                                    </li>
                                </ol>
                            </div>
                        </div>

                        <div class="image-usecase-row">
                            <div class="use-case-section">
                                <div class="use-case-header">
                                    <span class="use-case-icon">🎓</span>
                                    <h2>Use Case: Connected Executive Education</h2>
                                </div>
                                <div class="use-case-content">
                                    <p>Connected Executive Education (or CEE for short) is a fictitious company that
                                        delivers executive training courses to individuals and businesses around the
                                        world. CEE uses the Agentforce 36O Platform to streamline and modernize their
                                        executive learning programs with intelligent agents and apps.</p>
                                    <p>CEE built this custom application on Salesforce to manage courses, instructors,
                                        students, and enrollments. Agentforce helps them automate their operations,
                                        personalize and scale learner engagement, and unlock real-time insights.</p>
                                    <p>When you're ready, move on to the next stage of your free trial by clicking the
                                        buttons below, or at the top of the screen.</p>
                                </div>
                            </div>
                            <div class="hero-image-container">
                                <img src={trialHeroImage} alt="Agentforce 36O Platform" class="hero-image" />
                            </div>
                        </div>

                        <h3 class="section-title">What You Can Do Inside the Trial</h3>
                        <div class="feature-cards">
                            <div class="feature-card clickable" data-step="1" onclick={handleCardClick}>
                                <lightning-icon icon-name="standard:apps" size="medium"></lightning-icon>
                                <h3>Tour the Sample App</h3>
                                <p>A ready-to-use Learning Management AI app built entirely on Salesforce.</p>
                                <span class="card-link">Explore →</span>
                            </div>
                            <div class="feature-card clickable" data-step="2" onclick={handleCardClick}>
                                <lightning-icon icon-name="standard:bot" size="medium"></lightning-icon>
                                <h3>Agentforce Builder</h3>
                                <p>Configure your Agentforce. Set up agent actions and automate workflows.</p>
                                <span class="card-link">Configure →</span>
                            </div>
                            <div class="feature-card clickable" data-step="3" onclick={handleCardClick}>
                                <lightning-icon icon-name="standard:case" size="medium"></lightning-icon>
                                <h3>Test Agentforce</h3>
                                <p>Ensure Agentforce is ready to go live by testing it thoroughly with built-in tools.</p>
                                <span class="card-link">Test →</span>
                            </div>
                            <div class="feature-card clickable" data-step="4" onclick={handleCardClick}>
                                <lightning-icon icon-name="standard:canvas" size="medium"></lightning-icon>
                                <h3>Agentforce Vibes</h3>
                                <p>Design and enhance app pages with AI-generated UI components.</p>
                                <span class="card-link">Create →</span>
                            </div>
                            <div class="feature-card clickable" data-step="5" onclick={handleCardClick}>
                                <lightning-icon icon-name="utility:upload" size="medium"></lightning-icon>
                                <h3>Deploy Securely</h3>
                                <p>Deploy seamlessly with built-in metadata tools.</p>
                                <span class="card-link">Deploy →</span>
                            </div>
                            <div class="feature-card clickable" data-step="6" onclick={handleCardClick}>
                                <lightning-icon icon-name="standard:insights" size="medium"></lightning-icon>
                                <h3>Event Monitoring</h3>
                                <p>Monitor activity, mitigate threats, and drive adoption.</p>
                                <span class="card-link">Monitor →</span>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Step 1: Inspect App -->
                <template if:true={isStep1}>
                    <div class="step-content">
                        <div class="back-link" onclick={handleBackToWelcome}>
                            <lightning-icon icon-name="utility:chevronleft" size="xx-small"></lightning-icon>
                            <span>Back to Guide Home</span>
                        </div>
                        <div class="step-header">
                            <lightning-icon icon-name="standard:apps" size="large" class="step-icon"></lightning-icon>
                            <div class="step-header-text">
                                <h2>Tour the Sample App</h2>
                                <p class="step-description">Explore the components and data in Connected Executive
                                    Education's custom AI application.</p>
                                <p class="step-meta"><em>Estimated time to complete</em>: 3 minutes</p>
                            </div>
                        </div>

                        <div class="instruction-panel">
                            <div class="intro-section">
                                <p>The Learning Management App is a fully configured, custom AI application
                                    that CEE built on the Agentforce 36O Platform. Before you start working with AI agents
                                    or metadata tools, take a brief tour of the core building blocks of this app inside this
                                    secure development environment. These custom objects, pages, and dashboards represent
                                    how CEE tracks courses, learners, and progress across their executive education
                                    programs. This application is a great example of what you can build on Salesforce – so
                                    get inspired!</p>
                            </div>
                        </div>

                        <!-- Courses Section -->
                        <div class="object-detail-section">
                            <div class="object-detail-header">
                                <lightning-icon icon-name="custom:custom24" size="medium"></lightning-icon>
                                <h3>Courses</h3>
                            </div>
                            <div class="object-detail-content">
                                <p>The <strong>Courses</strong> object stores all offerings available in CEE's executive
                                    education catalog. Each record includes essential details such as category, delivery
                                    format, duration, and instructor information.</p>
                                <p>When you open the Courses tab, you'll see a list of sample course records – like
                                    <em>Executive Leadership Fundamentals</em> and <em>Digital Transformation Strategy</em>. These records give you a realistic view of how a company like CEE might manage a dynamic course catalog inside Salesforce.</p>
                                <div class="section-screenshot">
                                    <img src={coursesImage} alt="Courses List View" class="screenshot-image" />
                                </div>
                                <div class="explore-list">
                                    <h4>Try exploring:</h4>
                                    <ul>
                                        <li>The course list view to browse available programs</li>
                                        <li>A course record to view its metadata and learning details</li>
                                        <li>How each course links to active enrollments</li>
                                    </ul>
                                </div>
                            </div>
                        </div>

                        <!-- Students Section -->
                        <div class="object-detail-section">
                            <div class="object-detail-header">
                                <lightning-icon icon-name="standard:people" size="medium"></lightning-icon>
                                <h3>Students</h3>
                            </div>
                            <div class="object-detail-content">
                                <p>The <strong>Students</strong> object captures learner profiles for individuals
                                    enrolled in CEE's executive programs. Each profile includes the learner's name,
                                    role, organization, contact information, and enrollment status.</p>
                                <p>Opening a student record like <strong>STU-0059 (Lisa Moore)</strong> shows:</p>
                                <ul class="feature-list">
                                    <li>Student details such as company and job title</li>
                                    <li>Contact information used for communication and automated workflows</li>
                                    <li>Status indicators that reflect where the learner is in their journey</li>
                                </ul>
                                <div class="section-screenshot">
                                    <img src={studentsImage} alt="Students List View" class="screenshot-image" />
                                </div>
                                <p class="detail-note">This data model allows CEE to keep a centralized, up-to-date
                                    record of every participant.</p>
                            </div>
                        </div>

                        <!-- Enrollments Section -->
                        <div class="object-detail-section">
                            <div class="object-detail-header">
                                <lightning-icon icon-name="standard:task" size="medium"></lightning-icon>
                                <h3>Enrollments</h3>
                            </div>
                            <div class="object-detail-content">
                                <p>The <strong>Enrollments</strong> object connects students to their courses and tracks
                                    their progress. Each enrollment record includes the course name, the student
                                    assigned, start dates, and a live progress indicator.</p>
                                <p>The <strong>Course Enrollments Dashboard</strong> organizes these records for quick
                                    insight. You'll see:</p>
                                <ul class="feature-list">
                                    <li>A searchable list of all active enrollments</li>
                                    <li>Progress bars showing learner completion</li>
                                    <li>Course and student names linked directly to their records</li>
                                    <li>Enrollment creation dates to track timelines</li>
                                </ul>
                                <div class="section-screenshot">
                                    <img src={enrollmentsImage} alt="Enrollments Dashboard" class="screenshot-image" />
                                </div>
                                <p class="detail-note">This view helps CEE's coordinators and program managers monitor
                                    multiple cohorts at once.</p>
                            </div>
                        </div>

                        <!-- Try It Now -->
                        <div class="action-box highlight">
                            <div class="action-box-header">
                                <lightning-icon icon-name="utility:touch_action" size="small"></lightning-icon>
                                <h4>Try It Now</h4>
                            </div>
                            <p>Check out the power of a custom application on Salesforce for yourself!</p>
                            <ol class="action-list">
                                <li>Open <strong>Courses</strong> to explore the catalog of available programs</li>
                                <li>Navigate to <strong>Students</strong> to view individual learner profiles</li>
                                <li>Select <strong>Enrollments</strong> to review current progress across courses</li>
                                <li>Return to <strong>Learning Management Home</strong> for a consolidated dashboard
                                </li>
                            </ol>
                            <p>Return to the Agentforce 36O Platform tab when you're ready to move on.</p>
                        </div>
                    </div>
                </template>

                <!-- Step 2: Agentforce Builder -->
                <template if:true={isStep2}>
                    <div class="step-content">
                        <div class="back-link" onclick={handleBackToWelcome}>
                            <lightning-icon icon-name="utility:chevronleft" size="xx-small"></lightning-icon>
                            <span>Back to Guide Home</span>
                        </div>
                        <div class="step-header">
                            <lightning-icon icon-name="standard:bot" size="large" class="step-icon"></lightning-icon>
                            <div class="step-header-text">
                                <h2>Agentforce Builder</h2>
                                <p class="step-description">Build and customize Agentforce with no code.</p>
                                <p class="step-meta"><em>Estimated time to complete</em>: 6 minutes</p>
                            </div>
                        </div>
                        <div class="instruction-panel">
                            <div class="intro-section">
                                <p>Agentforce helps you bring AI agents into your workflows and applications to improve productivity, with humans and agents working together. CEE wants to build and customize their Agentforce in order to help their team manage courses, students, and enrollments for thousands of learners. We're going to show you how to quickly and easily customize an agent for the Learning Management app.</p>
                                <p>You may wish to keep this tab open in a separate window to follow along.</p>
                            </div>
                            <!-- Step 1: Create an Agentforce Employee Agent and Open Agentforce Builder -->
                            <div class="config-section">
                                <div class="config-header">
                                    <span class="config-number">1</span>
                                    <h3>Create an Agentforce Employee Agent and Open Agentforce Builder</h3>
                                </div>
                                <p>Let's create an Agentforce Employee Agent and get into Agentforce Builder.</p>
                                <p>In the upper right hand of this screen, click the gear icon to go to <strong>Setup</strong>.</p>
                                <p>Search for <strong>"Agentforce Agents."</strong></p>
                                <div class="preconfig-notice" style="margin-bottom: 1em;">
                                    <p><strong>Note:</strong> Go to <strong>Setup</strong> → <strong>Agentforce Agents</strong>, turn <strong>Agentforce</strong> <span class="status-on">ON</span>, and refresh the page.</p>
                                </div>
                                <div class="section-screenshot">
                                    <img src={agentforceAgentSetupImage} alt="Agentforce Agent Setup" class="screenshot-image" />
                                </div>
                                <p>Click <strong>New Agent</strong>.</p>
                                <div class="section-screenshot">
                                    <img src={newAgentCreationImage} alt="New Agent Creation" class="screenshot-image" />
                                </div>
                                <p>On the Select an agent screen, select <strong>Agentforce Employee Agent</strong>, then click <strong>Next</strong>.</p>
                                <p>On the Select your agent's topics screen, uncheck the <strong>General FAQ</strong> topic, then click <strong>Next</strong>.</p>
                                <div class="section-screenshot">
                                    <img src={uncheckGenFaqImage} alt="Uncheck General FAQ Topic" class="screenshot-image" />
                                </div>
                                <p>On the Customize your agent screen, keep the default values for <strong>Name</strong> and <strong>Role</strong>, and update the <strong>Company</strong> description to:</p>
                                <div class="topic-details-grid">
                                    <div class="topic-field full-width">
                                        <label>Company:</label>
                                        <span class="field-value">Connected Executive Education delivers executive training programs and manages courses, learners, and enrollments on Salesforce.</span>
                                    </div>
                                </div>
                                <p>Then click <strong>Next</strong>.</p>
                                <div class="section-screenshot">
                                    <img src={agentDescImage} alt="Agent Description Screen" class="screenshot-image" />
                                </div>
                                <p>On the Select data sources (Optional) screen, skip this step and click <strong>Create</strong>.</p>
                                <p>You're now in <strong>Agentforce Builder</strong>. It's where you'll be able to customize Agentforce for CEE's needs, using Topics, Data, Actions, Language, Events, and more.</p>
                            </div>

                            <!-- Step 2: Create the Topic -->
                            <div class="config-section">
                                <div class="config-header">
                                    <span class="config-number">2</span>
                                    <h3>Create a New Topic</h3>
                                </div>
                                <p>Topics define specific conversation areas or knowledge domains an agent can handle.
                                    Now you'll create a custom topic for Learning Management lookups.</p>
                                <ol class="numbered-steps">
                                    <li>Click <strong>Topics</strong> in the left-hand navigation</li>
                                    <li>Click <strong>New</strong>, then click <strong>Create Topic</strong></li>
                                    <li>When prompted "<em>What do you want this topic to do?</em>", click <strong>Next</strong> to skip this optional step.</li>
                                    <li>Enter the topic details: Name, API Name, Classification Description, Scope, and Instructions. We've provided these for you to copy and paste below.</li>
                                    <li>Click <strong>Next</strong> to continue, and then click <strong>Finish</strong></li>
                                </ol>

                                <div class="topic-details-grid">
                                    <div class="topic-field">
                                        <label>Name:</label>
                                        <code>Learning Management Lookup</code>
                                    </div>
                                    <div class="topic-field">
                                        <label>API Name:</label>
                                        <code>Learning_Management_Lookup</code>
                                    </div>
                                    <div class="topic-field full-width">
                                        <label>Classification Description:</label>
                                        <span class="field-value">Classifies user requests that involve searching or
                                            retrieving Courses, Students, or Enrollments in the Learning Management
                                            System.</span>
                                    </div>
                                    <div class="topic-field full-width">
                                        <label>Scope:</label>
                                        <span class="field-value">Your job is to search LMS data using Apex-based
                                            actions and provide clear summaries of Course, Student, and Enrollment
                                            results.</span>
                                    </div>
                                    <div class="topic-field full-width">
                                        <label>Instructions:</label>
                                        <span class="field-value">Use the custom Apex Actions to perform LMS lookups.
                                            Always return clear and concise responses summarizing the results in
                                            bullets.</span>
                                    </div>
                                </div>
                                <div class="section-screenshot">
                                    <img src={topicCreationImage} alt="Topic Creation Screen"
                                        class="screenshot-image" />
                                </div>
                            </div>

                            <!-- Step 3: Create Agent Actions inside the Topic -->
                            <div class="config-section">
                                <div class="config-header">
                                    <span class="config-number">3</span>
                                    <h3>Add Agent Actions to the Topic</h3>
                                </div>
                                <p>Actions are the specific tasks or workflows that an agent can execute when triggered.
                                    You just created the Learning Management Lookup topic, and now you'll add custom
                                    Apex actions that the agent can invoke to Search Courses, Search Students, and
                                    Search Enrollments.</p>
                                <ol class="numbered-steps">
                                    <li>Still in Agentforce Builder, click on "<strong>Learning Management Lookup</strong>," the topic you just created.</li>
                                    <li>Click on "<strong>This Topic's Actions</strong>" at the top of the Topic Details panel.</li>
                                    <li>Click "<strong>New</strong>," then click "<strong>Create New Action</strong>."</li>
                                    <li>Set <strong>Reference Action Type</strong> to <code>Apex</code>.</li>
                                    <li>Set <strong>Reference Action Category</strong> to <code>Invocable Method</code>.</li>
                                    <li>Select one of the available Apex actions:
                                        <ul class="sub-list">
                                            <li><code>Search Courses</code></li>
                                            <li><code>Search Enrollments</code></li>
                                            <li><code>Search Students</code></li>
                                        </ul>
                                    </li>
                                    <li>Click <strong>Next</strong>.</li>
                                </ol>
                                <div class="section-screenshot">
                                    <img src={agentActionImage} alt="Agent Actions Configuration"
                                        class="screenshot-image" />
                                </div>

                                <h4>Configure the Search Courses action</h4>
                                <ol class="numbered-steps">
                                    <li>Select <code>Search Courses</code></li>
                                    <li>For <strong>Show loading text for this action</strong>, enter <code>Searching courses</code></li>
                                    <li>Inputs and outputs should already be pre-populated</li>
                                    <li>Scroll down and locate <strong>Summary of all matching courses</strong> in the Output section</li>
                                    <li>Check <strong>Show in conversation</strong></li>
                                    <li>Click <strong>Finish</strong></li>
                                </ol>

                                <h4>Configure the Search Enrollments action</h4>
                                <p>Repeat the same steps:</p>
                                <ol class="numbered-steps">
                                    <li>Select <code>Search Enrollments</code></li>
                                    <li>For <strong>Show loading text for this action</strong>, enter <code>Searching enrollments</code></li>
                                    <li>Inputs and outputs should already be pre-populated</li>
                                    <li>Scroll down and locate <strong>Summary of all matching enrollments</strong> in the Output section</li>
                                    <li>Check <strong>Show in conversation</strong></li>
                                    <li>Click <strong>Finish</strong></li>
                                </ol>

                                <h4>Configure the Search Students action</h4>
                                <p>Repeat the same steps again:</p>
                                <ol class="numbered-steps">
                                    <li>Select <code>Search Students</code></li>
                                    <li>For <strong>Show loading text for this action</strong>, enter <code>Searching students</code></li>
                                    <li>Inputs and outputs should already be pre-populated</li>
                                    <li>Scroll down and locate <strong>Summary of all matching students</strong> in the Output section</li>
                                    <li>Check <strong>Show in conversation</strong></li>
                                    <li>Click <strong>Finish</strong></li>
                                </ol>

                                <p>After completing all three, your Topic should show <strong>3 Agent Actions</strong>.</p>
                            </div>

                            <!-- Step 4: Test Your Agent -->
                            <div class="config-section">
                                <div class="config-header">
                                    <span class="config-number">4</span>
                                    <h3>You're Ready for Testing</h3>
                                </div>
                                <p>Now, click <strong>Activate</strong> in the top right.</p>
                                <p>When prompted with configuration warnings, click <strong>Ignore &amp; Activate</strong> to activate your agent.</p>
                                <div class="section-screenshot">
                                    <img src={ignoreWarningsImage} alt="Ignore Warnings and Activate"
                                        class="screenshot-image" />
                                </div>
                                <p>Great work! Your agent is ready to test and iterate on.</p>
                                <p>Use the <strong>Conversation Preview</strong> window on the right-hand side of
                                    Agentforce Builder to test the new Learning Management Lookup topic.</p>
                                <div class="tip-box">
                                    <span>💬</span>
                                    <span><em>Tell me about the Cybersecurity for Executives course.</em></span>
                                </div>
                                <div class="section-screenshot">
                                    <img src={agentBuilderTestImage} alt="Testing Agent in Builder"
                                        class="screenshot-image" />
                                </div>
                            </div>

                            <!-- Wrap-up Block -->
                            <div class="action-box highlight">
                                <div class="action-box-header">
                                    <lightning-icon icon-name="utility:touch_action" size="small"></lightning-icon>
                                    <h4>Ready for More Testing</h4>
                                </div>
                                <p>Testing your agent is a thorough process that goes beyond just trying a few
                                    questions. Click "Next" to see more testing tools in action.</p>
                            </div>
                        </div>
                    </div>
                </template>

                <!-- Step 3: Test Agent -->
                <template if:true={isStep3}>
                    <div class="step-content">
                        <div class="back-link" onclick={handleBackToWelcome}>
                            <lightning-icon icon-name="utility:chevronleft" size="xx-small"></lightning-icon>
                            <span>Back to Guide Home</span>
                        </div>
                        <div class="step-header">
                            <lightning-icon icon-name="standard:live_chat" size="large"
                                class="step-icon"></lightning-icon>
                            <div class="step-header-text">
                                <h2>Test Agentforce</h2>
                                <p class="step-description">Validate agent logic at scale using AI-generated test suites
                                </p>
                                <p class="step-meta"><em>Estimated time to complete</em>: 5 minutes</p>
                            </div>
                        </div>
                        <div class="instruction-panel">
                            <div class="intro-section">
                                <p>Now that you've configured the Learning Management Lookup topic, you need to ensure
                                    that your agent performs consistently. Otherwise, you might release an agent before
                                    it's fully ready!</p>
                                <p>Instead of having to manually brainstorm and type dozens (or hundreds) of chat inputs
                                    to test your Agentforce, we have Agentforce Testing Center to automate the testing
                                    process. You'll use a Batch Test to generate synthetic test cases based on your
                                    topic's definition.</p>
                            </div>

                            <!-- Step 1: Open Batch Test -->
                            <div class="config-section">
                                <div class="config-header">
                                    <span class="config-number">1</span>
                                    <h3>Open Batch Test</h3>
                                </div>
                                <p>Inside Agentforce Builder, look for the Batch Test button on the top navigation bar
                                    and click it.</p>
                                <p>This opens the test creation modal for creating new test suites.</p>
                                <div class="section-screenshot">
                                    <img src={agentbuilderBatchTestImage} alt="Batch Test Button"
